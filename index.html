<!doctype html>
<html lang="es">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealyMedios Radio | Tu Radio Real</title>
  <link rel="icon" type="image/jpeg" href="Logo.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&amp;family=Lexend:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
  <style>
    :root {
      --primary-vibrant: #00A3FF;
      --primary-dark: #0088CC;
      --secondary-deep: #1A1B1E;
      --secondary-light: #282A2F;
      --accent-glow: #00A3FF;
      --success-pulse: #00A3FF;
      --text-bright: #F5F5F5;
      --text-muted: #8E9196;
      --border-glow: rgba(0, 163, 255, 0.3);
      --bg-panel: #282A2F;
      --bg-borders: #3A3C42;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #1A1B1E 0%, #282A2F 50%, #1A1B1E 100%);
      color: var(--text-bright);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 20% 50%, rgba(0, 163, 255, 0.05) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(0, 163, 255, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100%;
    }

    /* ===== PLAYER HERO ===== */
    .player-hero {
      width: 100%;
      max-width: 500px;
      background: linear-gradient(180deg, rgba(40, 42, 47, 0.8) 0%, rgba(26, 27, 30, 0.9) 100%);
      border: 1px solid var(--border-glow);
      border-radius: 32px;
      padding: 60px 40px;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 80px rgba(0, 163, 255, 0.15),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: slide-up 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-display {
      margin-bottom: 30px;
    }

    .logo-display img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--primary-vibrant);
      object-fit: cover;
      box-shadow: 0 0 40px rgba(255, 107, 53, 0.4),
                  inset 0 0 20px rgba(255, 107, 53, 0.2);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .station-title {
      font-family: 'Lexend', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #00A3FF 0%, #0088CC 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .station-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 40px;
      letter-spacing: 0.5px;
    }

    /* ===== PLAY BUTTON ===== */
    .play-container {
      position: relative;
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }

    .play-ring {
      position: absolute;
      width: 180px;
      height: 180px;
      border: 2px solid var(--primary-vibrant);
      border-radius: 50%;
      opacity: 0;
      animation: ring-pulse 2s ease-out infinite;
    }

    .play-ring:nth-child(2) {
      animation-delay: 0.5s;
    }

    @keyframes ring-pulse {
      0% {
        opacity: 0.8;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(1.3);
      }
    }

    .play-btn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00A3FF 0%, #0088CC 100%);
      border: none;
      color: white;
      font-size: 3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0, 163, 255, 0.4),
                  inset -2px -2px 8px rgba(0, 0, 0, 0.3);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      z-index: 2;
    }

    .play-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 25px 70px rgba(0, 163, 255, 0.5),
                  inset -2px -2px 8px rgba(0, 0, 0, 0.3);
    }

    .play-btn:active {
      transform: scale(0.96);
    }

    .play-btn.playing {
      animation: btn-pulse 1.5s ease-in-out infinite;
    }

    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 20px 60px rgba(0, 163, 255, 0.4), inset -2px -2px 8px rgba(0, 0, 0, 0.3); }
      50% { box-shadow: 0 25px 80px rgba(0, 163, 255, 0.7), inset -2px -2px 8px rgba(0, 0, 0, 0.3); }
    }

    /* ===== STATUS & CONTROLS ===== */
    .status-display {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--primary-vibrant);
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-display.live::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--success-pulse);
      border-radius: 50%;
      margin-right: 8px;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .controls-group {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid rgba(0, 163, 255, 0.15);
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      max-width: 180px;
    }

    .volume-icon {
      color: var(--primary-vibrant);
      font-size: 1.2rem;
    }

    .volume-slider {
      width: 100%;
      height: 3px;
      border-radius: 2px;
      background: rgba(0, 163, 255, 0.2);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--primary-vibrant);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 163, 255, 0.5);
      transition: all 0.2s ease;
    }

    .volume-slider::-webkit-slider-thumb:hover {
      width: 18px;
      height: 18px;
      box-shadow: 0 0 15px rgba(0, 163, 255, 0.8);
    }

    .volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--primary-vibrant);
      border: none;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 163, 255, 0.5);
      transition: all 0.2s ease;
    }

    /* ===== SOCIAL BOTTOM ===== */
    .social-footer {
      margin-top: 50px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .social-icon {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(0, 163, 255, 0.1);
      border: 1.5px solid var(--primary-vibrant);
      color: var(--primary-vibrant);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1.1rem;
    }

    .social-icon:hover {
      background: var(--primary-vibrant);
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 163, 255, 0.3);
    }

    .feedback-btn {
      background: linear-gradient(135deg, #00A3FF 0%, #0088CC 100%);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0, 163, 255, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .feedback-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 163, 255, 0.4);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .player-hero {
        padding: 40px 25px;
        max-width: 100%;
      }

      .station-title {
        font-size: 2rem;
      }

      .play-btn {
        width: 120px;
        height: 120px;
        font-size: 2.5rem;
      }

      .play-ring {
        width: 150px;
        height: 150px;
      }

      .volume-control {
        width: 100%;
      }

      main {
        padding: 20px;
      }
    }

    @media (max-width: 480px) {
      .player-hero {
        padding: 30px 20px;
        border-radius: 24px;
      }

      .station-title {
        font-size: 1.6rem;
      }

      .logo-display img {
        width: 80px;
        height: 80px;
      }

      .play-btn {
        width: 110px;
        height: 110px;
        font-size: 2rem;
      }

      .controls-group {
        flex-direction: column;
        gap: 15px;
      }

      .volume-control {
        width: 100%;
      }
    }
  </style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>

 </head>
 <body>
  <main>
   <div class="player-hero">
    <div class="logo-display">
     <img src="Logo.jpeg" alt="RealyMedia Logo">
    </div>
    <h1 class="station-title">REALYMEDIA</h1>
    <p class="station-subtitle">Tu Radio Real • 24/7</p>
    <div class="play-container">
     <div class="play-ring"></div>
     <div class="play-ring"></div><button id="btnPlay" class="play-btn"> <i class="fas fa-play" id="icon"></i> </button>
    </div>
    <div class="status-display live" id="status">
     EN VIVO
    </div>
    <div class="controls-group">
     <div class="volume-control">
      <i class="fas fa-volume-low volume-icon"></i> <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70">
     </div>
    </div>
    <div class="social-footer">
     <button class="social-icon" onclick="window.open('https://instagram.com/realymedia', '_blank')" title="Instagram"> <i class="fab fa-instagram"></i> </button> <button class="social-icon" onclick="window.open('https://facebook.com/realymedia', '_blank')" title="Facebook"> <i class="fab fa-facebook"></i> </button> <button class="social-icon" onclick="window.open('https://tiktok.com/@realymedia', '_blank')" title="TikTok"> <i class="fab fa-tiktok"></i> </button> <button class="feedback-btn" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLScyeH-GJQJLeUcT5UgF-SeHkt1dhggmQzHQx77rK3YHdVa0VQ/viewform', '_blank')"> <i class="fas fa-paper-plane"></i> Feedback </button>
    </div>
   </div>
  </main>
  <script>
    const streamUrl = 'https://stream.realymedio.online/stream';
    let sound = null;
    let isPlaying = false;

    function initializeAudio() {
      sound = new Howl({
        src: [streamUrl],
        html5: true,
        volume: 0.7,
        onplay: () => {
          isPlaying = true;
          updatePlayButton();
          updateStatus('EN VIVO');
        },
        onstop: () => {
          isPlaying = false;
          updatePlayButton();
          updateStatus('EN VIVO');
        },
        onload: () => {
          console.log('Stream cargado correctamente');
        },
        onloaderror: (id, error) => {
          console.error('Error cargando el stream:', error);
          updateStatus('ERROR DE CONEXIÓN');
        },
        onfail: () => {
          console.error('Error al reproducir');
          updateStatus('ERROR DE REPRODUCCIÓN');
        }
      });
    }

    document.getElementById('btnPlay').addEventListener('click', () => {
      if (!sound) {
        updateStatus('CONECTANDO...');
        initializeAudio();
        setTimeout(() => {
          sound.play();
          isPlaying = true;
          updatePlayButton();
          updateStatus('EN VIVO');
        }, 500);
        return;
      }

      if (isPlaying) {
        sound.pause();
        isPlaying = false;
        updatePlayButton();
        updateStatus('EN PAUSA');
      } else {
        sound.play();
        isPlaying = true;
        updatePlayButton();
        updateStatus('EN VIVO');
      }
    });

    function updatePlayButton() {
      const btn = document.getElementById('btnPlay');
      const icon = document.getElementById('icon');

      if (isPlaying) {
        icon.classList.remove('fa-play');
        icon.classList.add('fa-pause');
        btn.classList.add('playing');
      } else {
        icon.classList.remove('fa-pause');
        icon.classList.add('fa-play');
        btn.classList.remove('playing');
      }
    }

    function updateStatus(text) {
      document.getElementById('status').textContent = text;
    }

    document.getElementById('volumeSlider').addEventListener('input', (e) => {
      if (sound) {
        sound.volume(e.target.value / 100);
      }
    });

    // Debug en consola
    console.log('Stream URL:', streamUrl);
    console.log('Howler cargado:', typeof Howl !== 'undefined');
  </script>
