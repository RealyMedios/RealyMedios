<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RealyMedios Radio | Monitor Pro</title>
  <link rel="icon" type="image/jpeg" href="Logo.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --obs-blue: #00A3FF;
      --obs-farandula: #FF00FF; 
      --obs-bg: #1A1B1E;
      --obs-panel: #282A2F;
      --obs-border: #3A3C42;
      --text: #F5F5F5;
      --text-dim: #8E9196;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--obs-bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #282A2F 0%, #1A1B1E 100%);
      transition: background 0.8s ease;
    }

    /* MODO FOCO */
    body.focus-mode {
      background: #000000 !important;
    }
    body.focus-mode .player-hero {
      border-color: #111;
      box-shadow: 0 0 100px rgba(0,0,0,1);
    }
    body.focus-mode .logo-display, 
    body.focus-mode .station-title, 
    body.focus-mode .weather-row, 
    body.focus-mode .news-panel,
    body.focus-mode .social-footer {
      opacity: 0.1;
      filter: blur(2px);
      pointer-events: none;
    }
    body.focus-mode .video-container {
      transform: scale(1.05);
      box-shadow: 0 0 50px var(--obs-blue);
      opacity: 1 !important;
      filter: none !important;
    }

    .player-hero {
      width: 95%;
      max-width: 550px;
      background: rgba(40, 42, 47, 0.95);
      border: 1px solid rgba(0, 163, 255, 0.2);
      border-radius: 24px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      transition: all 0.5s ease;
      position: relative;
    }

    .logo-display img {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid var(--obs-blue);
      margin-bottom: 15px;
      transition: 0.5s;
    }

    .station-title { font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; margin-bottom: 5px; transition: 0.5s; }
    .station-title span { color: var(--obs-blue); }

    .weather-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: 'Roboto Mono', monospace;
      margin-bottom: 15px;
      transition: 0.5s;
    }

    /* PANEL DE NOTICIAS DUAL */
    .news-panel {
      background: #000000;
      border-radius: 12px;
      padding: 20px;
      margin: 10px 0 20px 0;
      border-left: 5px solid var(--obs-blue);
      min-height: 125px;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      transition: 0.5s;
    }

    .news-category {
      font-family: 'Roboto Mono', monospace;
      font-size: 0.7rem;
      font-weight: 900;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 12px;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .cat-deportes { background: rgba(0, 163, 255, 0.25); color: var(--obs-blue); }
    .cat-farandula { background: rgba(255, 0, 255, 0.25); color: var(--obs-farandula); }

    #news-content {
      font-family: 'Roboto Mono', monospace;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #FFFFFF;
      transition: opacity 0.5s ease;
    }

    .video-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid var(--obs-border);
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .social-footer { display: flex; gap: 10px; justify-content: center; transition: 0.5s; }
    
    .social-btn {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: var(--obs-panel);
      color: white;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      border: 1px solid var(--obs-border);
    }

    .feedback-btn {
      padding: 0 15px;
      border-radius: 8px;
      background: var(--obs-blue);
      color: white;
      font-weight: bold;
      font-size: 0.75rem;
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
    }

    /* CONTROLES TÉCNICOS */
    .pro-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 25px;
      padding-top: 15px;
      border-top: 1px solid var(--obs-border);
      font-family: 'Roboto Mono', monospace;
      font-size: 0.65rem;
    }

    .latency-meter { color: #00ff00; display: flex; align-items: center; gap: 5px; }
    
    .btn-focus {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--obs-border);
      color: var(--text-dim);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-focus:hover { background: var(--obs-blue); color: white; border-color: var(--obs-blue); }

    .fade-out { opacity: 0; }
  </style>
</head>
<body>

  <div class="player-hero">
    <div class="logo-display">
      <img src="Logo.jpeg" alt="Logo">
    </div>
    
    <h1 class="station-title">REALY<span>MEDIOS</span></h1>
    
    <div class="weather-row">
      <span><i class="fas fa-broadcast-tower"></i> MIRANDA, VZLA</span>
      <span><i class="fas fa-thermometer-half"></i> 28°C</span>
      <span style="color: var(--obs-blue); font-weight: bold;">● LIVE</span>
    </div>

    <div class="news-panel" id="main-panel">
      <div id="news-tag" class="news-category cat-deportes">Deportes</div>
      <div id="news-content">Sincronizando feed informativo...</div>
    </div>

    <div class="video-container">
      <iframe width="100%" height="100%" src="https://www.youtube.com/embed/@RealyMediosRadio/live" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="social-footer">
      <a href="https://instagram.com/realymedios" class="social-btn" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://tiktok.com/@realymedia" class="social-btn" target="_blank"><i class="fab fa-tiktok"></i></a>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLScyeH-GJQJLeUcT5UgF-SeHkt1dhggmQzHQx77rK3YHdVa0VQ/viewform" class="feedback-btn" target="_blank">
        <i class="fas fa-paper-plane"></i> FEEDBACK
      </a>
    </div>

    <div class="pro-controls">
      <div class="latency-meter">
        <i class="fas fa-microchip"></i> BUFFER: <span id="ping-val">24</span>ms
      </div>
      <button class="btn-focus" onclick="toggleFocus()">
        <i class="fas fa-lightbulb"></i> MODO FOCO
      </button>
    </div>
  </div>

  <script>
    let sportsNews = [];
    let cultureNews = [];
    let showSports = true;
    let sportsIdx = 0;
    let cultureIdx = 0;

    // Función Modo Foco
    function toggleFocus() {
      document.body.classList.toggle('focus-mode');
    }

    // Monitor de Latencia Simulado
    setInterval(() => {
      const ping = Math.floor(Math.random() * (42 - 18 + 1) + 18);
      document.getElementById('ping-val').innerText = ping;
    }, 4000);

    // Fetch de Noticias
    async function fetchAllNews() {
      const proxy = 'https://api.rss2json.com/v1/api.json?rss_url=';
      const sportsRSS = encodeURIComponent('https://news.google.com/rss/search?q=venezuela+deportes&hl=es-419&gl=VE');
      const cultureRSS = encodeURIComponent('https://news.google.com/rss/search?q=venezuela+entretenimiento+espectaculos&hl=es-419&gl=VE');

      try {
        const [resS, resC] = await Promise.all([
          fetch(proxy + sportsRSS),
          fetch(proxy + cultureRSS)
        ]);
        const dataS = await resS.json();
        const dataC = await resC.json();

        if (dataS.status === 'ok') sportsNews = dataS.items.map(i => i.title.toUpperCase());
        if (dataC.status === 'ok') cultureNews = dataC.items.map(i => i.title.toUpperCase());
        
        rotateNews();
      } catch (e) {
        document.getElementById('news-content').innerText = "CONECTANDO CON EL SERVIDOR DE NOTICIAS...";
      }
    }

    function rotateNews() {
      const content = document.getElementById('news-content');
      const tag = document.getElementById('news-tag');
      const panel = document.getElementById('main-panel');
      
      content.classList.add('fade-out');

      setTimeout(() => {
        if (showSports && sportsNews.length > 0) {
          tag.innerText = "Deportes";
          tag.className = "news-category cat-deportes";
          panel.style.borderLeftColor = "var(--obs-blue)";
          content.innerText = sportsNews[sportsIdx];
          sportsIdx = (sportsIdx + 1) % sportsNews.length;
        } else if (cultureNews.length > 0) {
          tag.innerText = "Cultura y Farándula";
          tag.className = "news-category cat-farandula";
          panel.style.borderLeftColor = "var(--obs-farandula)";
          content.innerText = cultureNews[cultureIdx];
          cultureIdx = (cultureIdx + 1) % cultureNews.length;
        }

        content.classList.remove('fade-out');
        showSports = !showSports; 
      }, 500);

      setTimeout(rotateNews, 9000); 
    }

    fetchAllNews();
  </script>
</body>
</html>
